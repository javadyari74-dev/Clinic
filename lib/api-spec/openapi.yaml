components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    # ── Patient ──────────────────────────────────────────────────────────────
    Patient:
      type: object
      required: [id, fileNumber, name, phone, createdAt]
      properties:
        id: { type: integer }
        fileNumber: { type: string }
        name: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        birthdate: { type: ["string", "null"] }
        gender: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        tier: { type: ["string", "null"] }
        accountBalance: { type: integer }
        referrerType: { type: ["string", "null"] }
        referrerId: { type: ["integer", "null"] }
        referrerRate: { type: ["integer", "null"] }
        referrerName: { type: ["string", "null"] }
        createdAt: { type: integer }

    PatientInput:
      type: object
      required: [fileNumber, name, phone]
      properties:
        fileNumber: { type: string }
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        birthdate: { type: string }
        gender: { type: string }
        notes: { type: string }
        tier: { type: string }
        accountBalance: { type: integer }
        referrerType: { type: string }
        referrerId: { type: integer }
        referrerRate: { type: integer }

    PatientUpdate:
      type: object
      properties:
        fileNumber: { type: string }
        name: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        birthdate: { type: ["string", "null"] }
        gender: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        tier: { type: ["string", "null"] }
        accountBalance: { type: integer }
        referrerType: { type: ["string", "null"] }
        referrerId: { type: ["integer", "null"] }
        referrerRate: { type: ["integer", "null"] }

    PatientAccountTransaction:
      type: object
      required: [id, patientId, amount, type, createdAt]
      properties:
        id: { type: integer }
        patientId: { type: integer }
        amount: { type: integer }
        type: { type: string }
        description: { type: ["string", "null"] }
        paymentId: { type: ["integer", "null"] }
