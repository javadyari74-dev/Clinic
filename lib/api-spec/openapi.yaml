openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Beauty Clinic Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: patients
  - name: services
  - name: staff
  - name: appointments
  - name: payments
  - name: discounts
  - name: inventory
  - name: commissions
  - name: commission-recipients
  - name: patient-notes
  - name: reminders
  - name: dashboard
  - name: reports
  - name: backup
  - name: activity

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Patients ──────────────────────────────────────────────────────────────
  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientList"
    post:
      operationId: createPatient
      tags: [patients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/export/excel:
