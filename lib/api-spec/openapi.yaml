          description: Excel file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
